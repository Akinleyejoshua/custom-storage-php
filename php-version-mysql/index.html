<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Cloud Storage Gateway - Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-900">Cloud Storage Gateway</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-blue-600 font-medium">Gallery</a>
                    <a href="upload.html" class="text-gray-600 hover:text-gray-900">Upload</a>
                    <a href="docs.html" class="text-gray-600 hover:text-gray-900">API Docs</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Media Gallery</h2>
            <p class="mt-2 text-gray-600">Browse and manage your uploaded media assets</p>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-2 bg-blue-100 rounded-lg">
                        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-500">Total Assets</p>
                        <p class="text-2xl font-semibold text-gray-900" id="totalAssets">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-2 bg-green-100 rounded-lg">
                        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path>
                        </svg>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-500">Images</p>
                        <p class="text-2xl font-semibold text-gray-900" id="imageCount">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-2 bg-purple-100 rounded-lg">
                        <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-500">Videos</p>
                        <p class="text-2xl font-semibold text-gray-900" id="videoCount">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex space-x-4">
                <button onclick="loadAssets()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    Refresh
                </button>
                <a href="upload.html" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    Upload New
                </a>
            </div>
            <div class="text-sm text-gray-500">
                Showing <span id="showingCount">0</span> assets
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <p class="mt-2 text-gray-600">Loading assets...</p>
        </div>

        <!-- Error State -->
        <div id="error" class="hidden bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800">Error loading assets</h3>
                    <p class="mt-1 text-sm text-red-700" id="errorMessage"></p>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty" class="hidden text-center py-12">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">No media assets</h3>
            <p class="mt-1 text-sm text-gray-500">Get started by uploading a new file.</p>
            <div class="mt-6">
                <a href="upload.html" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
                    Upload File
                </a>
            </div>
        </div>

        <!-- Gallery Grid -->
        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

        <!-- Load More -->
        <div id="loadMore" class="hidden text-center mt-8">
            <button onclick="loadMore()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-6 py-2 rounded-lg">
                Load More
            </button>
        </div>
    </div>

    <!-- Asset Modal -->
    <div id="assetModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-11/12 md:w-3/4 lg:w-1/2 shadow-lg rounded-md bg-white">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-900" id="modalTitle">Asset Details</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let hasMore = false;
        // Ensure no double slashes in API_BASE
        const API_BASE = window.location.origin + window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');

        // Load assets on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadAssets();
        });

        async function loadAssets(page = 1) {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const gallery = document.getElementById('gallery');
            const empty = document.getElementById('empty');
            const loadMore = document.getElementById('loadMore');

            loading.classList.remove('hidden');
            error.classList.add('hidden');
            gallery.innerHTML = '';
            empty.classList.add('hidden');
            loadMore.classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/api/assets?page=${page}&limit=20`);
                if (!response.ok) throw new Error('Failed to load assets');
                
                const result = await response.json();
                const assets = result.data || [];
                
                // Update stats
                document.getElementById('totalAssets').textContent = result.pagination?.total || 0;
                document.getElementById('showingCount').textContent = assets.length;
                
                // Count by type
                const images = assets.filter(a => a.mimeType.startsWith('image/')).length;
                const videos = assets.filter(a => a.mimeType.startsWith('video/')).length;
                document.getElementById('imageCount').textContent = images;
                document.getElementById('videoCount').textContent = videos;

                if (assets.length === 0) {
                    empty.classList.remove('hidden');
                } else {
                    renderGallery(assets);
                    hasMore = result.pagination?.hasMore || false;
                    if (hasMore) {
                        loadMore.classList.remove('hidden');
                    }
                    currentPage = page;
                }
            } catch (err) {
                error.classList.remove('hidden');
                document.getElementById('errorMessage').textContent = err.message;
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderGallery(assets) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = assets.map(asset => {
                const isVideo = asset.mimeType.startsWith('video/');
                const size = formatBytes(asset.fileSize);
                const date = new Date(asset.createdAt).toLocaleDateString();
                
                return `
                    <div class="bg-white rounded-lg shadow overflow-hidden hover:shadow-lg transition-shadow">
                        <div class="aspect-w-16 aspect-h-9 bg-gray-100 relative">
                            ${isVideo ? `
                                <video src="${asset.publicUrl}" class="w-full h-48 object-cover" muted></video>
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <div class="bg-black bg-opacity-50 rounded-full p-3">
                                        <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M8 5v14l11-7z"/>
                                        </svg>
                                    </div>
                                </div>
                            ` : `
                                <img src="${asset.publicUrl}" alt="${asset.originalFilename}" class="w-full h-48 object-cover" loading="lazy">
                            `}
                        </div>
                        <div class="p-4">
                            <h3 class="font-medium text-gray-900 truncate" title="${asset.originalFilename}">${asset.originalFilename}</h3>
                            <p class="text-sm text-gray-500 mt-1">${size} • ${date}</p>
                            <div class="mt-3 flex space-x-2">
                                <button onclick="copyUrl('${asset.publicUrl}')" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm">
                                    Copy URL
                                </button>
                                <button onclick="showAssetDetails('${asset.assetId}')" class="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-1 rounded text-sm">
                                    Details
                                </button>
                                <button onclick="deleteAsset('${asset.assetId}', '${asset.originalFilename}')" class="flex-1 bg-red-50 hover:bg-red-100 text-red-700 px-3 py-1 rounded text-sm">
                                    Delete
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function loadMore() {
            await loadAssets(currentPage + 1);
        }

        async function copyUrl(url) {
            try {
                await navigator.clipboard.writeText(url);
                alert('URL copied to clipboard!');
            } catch (err) {
                prompt('Copy this URL:', url);
            }
        }

        async function showAssetDetails(assetId) {
            try {
                const response = await fetch(`${API_BASE}/api/assets/${assetId}`);
                if (!response.ok) throw new Error('Asset not found');
                
                const result = await response.json();
                const asset = result.data;
                
                document.getElementById('modalTitle').textContent = asset.originalFilename;
                document.getElementById('modalContent').innerHTML = `
                    <div class="space-y-4">
                        ${asset.mimeType.startsWith('image/') ? `
                            <img src="${asset.publicUrl}" alt="${asset.originalFilename}" class="w-full rounded-lg">
                        ` : asset.mimeType.startsWith('video/') ? `
                            <video src="${asset.publicUrl}" controls class="w-full rounded-lg"></video>
                        ` : ''}
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div>
                                <p class="font-medium text-gray-500">Asset ID</p>
                                <p class="font-mono text-gray-900">${asset.assetId}</p>
                            </div>
                            <div>
                                <p class="font-medium text-gray-500">File Type</p>
                                <p class="text-gray-900">${asset.mimeType}</p>
                            </div>
                            <div>
                                <p class="font-medium text-gray-500">File Size</p>
                                <p class="text-gray-900">${formatBytes(asset.fileSize)}</p>
                            </div>
                            <div>
                                <p class="font-medium text-gray-500">Uploaded</p>
                                <p class="text-gray-900">${new Date(asset.createdAt).toLocaleString()}</p>
                            </div>
                        </div>
                        <div class="pt-4 border-t">
                            <p class="font-medium text-gray-500 text-sm mb-2">Public URL</p>
                            <div class="flex">
                                <input type="text" readonly value="${asset.publicUrl}" class="flex-1 px-3 py-2 bg-gray-50 border rounded-l text-sm font-mono">
                                <button onclick="copyUrl('${asset.publicUrl}')" class="px-4 py-2 bg-blue-600 text-white rounded-r hover:bg-blue-700">
                                    Copy
                                </button>
                            </div>
                        </div>
                        <div class="pt-4 border-t mt-4">
                            <button onclick="deleteAsset('${asset.assetId}', '${asset.originalFilename}')" class="w-full bg-red-50 hover:bg-red-100 text-red-700 px-4 py-2 rounded text-sm border border-red-200">
                                Delete Asset
                            </button>
                        </div>
                    </div>
                `;
                document.getElementById('assetModal').classList.remove('hidden');
            } catch (err) {
                alert('Failed to load asset details: ' + err.message);
            }
        }

        async function deleteAsset(assetId, filename) {
            if (!confirm(`Are you sure you want to delete "${filename}"? This cannot be undone.`)) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/assets/${assetId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    const result = await response.json();
                    throw new Error(result.error || 'Failed to delete asset');
                }
                
                // Refresh the gallery
                loadAssets(currentPage);
                
                // Close modal if open
                closeModal();
                
                alert('Asset deleted successfully');
            } catch (err) {
                alert('Error deleting asset: ' + err.message);
            }
        }
        
        function closeModal() {
            document.getElementById('assetModal').classList.add('hidden');
        }

        function formatBytes(bytes, precision = 2) {
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            bytes = Math.max(bytes, 0);
            const pow = Math.floor((bytes ? Math.log(bytes) : 0) / Math.log(1024));
            const powIndex = Math.min(pow, units.length - 1);
            bytes /= Math.pow(1024, powIndex);
            return bytes.toFixed(precision) + ' ' + units[powIndex];
        }

        // Close modal on outside click
        document.getElementById('assetModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
